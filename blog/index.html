<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog - KRYS PT</title>
  <meta name="description" content="Training, nutrition, and performance articles by Przemyslaw Krys - personal trainer based in Oslo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
  <style>
    :root {
      --black: #252422; --dark: #403D39; --silver: #CCC5B9;
      --orange: #EB5E28; --cream: #FFFCF2; --f: 'Oswald', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); font-family: var(--f); font-weight: 400; color: var(--black); overflow-x: hidden; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--black);
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5vw;
    }
    .nav-logo { font-size: 1rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cream); text-decoration: none; }
    .nav-logo span { color: var(--orange); }
    .nav-back { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--silver); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--orange); }

    /* HERO */
    .blog-hero {
      background: var(--black);
      padding: 6rem 5vw 5rem;
      position: relative; overflow: hidden;
    }
    .blog-hero-label {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--orange);
      display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem;
    }
    .blog-hero-label::before { content: ''; width: 18px; height: 2px; background: var(--orange); }
    .blog-hero h1 {
      font-size: clamp(2.2rem, 5vw, 4.5rem); font-weight: 800;
      text-transform: uppercase; letter-spacing: -0.02em; line-height: 1;
      color: var(--cream); margin-bottom: 1.2rem;
    }
    .blog-hero h1 span { color: var(--orange); }
    .blog-hero p { font-size: 0.88rem; color: var(--silver); max-width: 480px; line-height: 1.85; }
    .blog-bg-word {
      position: absolute; bottom: -0.05em; right: -0.02em;
      font-size: clamp(5rem, 14vw, 12rem); font-weight: 800;
      text-transform: uppercase; color: rgba(255,255,255,0.025);
      line-height: 1; pointer-events: none; white-space: nowrap;
    }

    /* FILTERS */
    .blog-filters {
      background: var(--black); border-top: 1px solid rgba(255,255,255,0.06);
      padding: 0 5vw 1.2rem; display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .filter-btn {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      border: 2px solid rgba(255,255,255,0.12); color: var(--silver);
      padding: 0.4rem 1rem; cursor: pointer; background: transparent;
      font-family: var(--f); transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
    .filter-btn.active { background: var(--orange); border-color: var(--orange); color: var(--cream); }

    /* ARTICLE GRID */
    .blog-grid-wrap { padding: 3.5rem 5vw 5rem; }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px; background: #E8E4DA;
    }

    .article-card {
      background: var(--cream);
      display: flex; flex-direction: column;
      transition: background 0.3s;
      cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .article-card:hover { background: var(--black); }

    .article-thumb {
      height: 200px; background: #E8E4DA; overflow: hidden; position: relative;
    }
    .article-card:first-child .article-thumb { height: 260px; }
    .article-thumb-bg {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #aaa;
    }

    .article-body { padding: 1.6rem; flex: 1; display: flex; flex-direction: column; }
    .article-cat {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--orange); margin-bottom: 0.5rem;
      transition: color 0.3s;
    }
    .article-card:hover .article-cat { color: var(--orange); }
    .article-title {
      font-size: 0.95rem; font-weight: 700; text-transform: uppercase;
      line-height: 1.3; margin-bottom: 0.6rem; transition: color 0.3s;
    }
    .article-card:hover .article-title { color: var(--cream); }
    .article-excerpt {
      font-size: 0.78rem; color: #5C5752; line-height: 1.75;
      flex: 1; transition: color 0.3s;
    }
    .article-card:hover .article-excerpt { color: var(--silver); }
    .article-meta {
      font-size: 0.6rem; color: var(--silver); margin-top: 1.2rem;
      font-weight: 600; letter-spacing: 0.06em;
      display: flex; justify-content: space-between;
      border-top: 1px solid rgba(0,0,0,0.06); padding-top: 0.8rem;
      transition: border-color 0.3s;
    }
    .article-card:hover .article-meta { border-top-color: rgba(255,255,255,0.08); }
    .article-read-more {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--orange);
    }

    /* EMPTY STATE */
    .no-articles {
      grid-column: 1/-1; padding: 4rem; text-align: center;
      font-size: 0.82rem; color: var(--silver); background: var(--cream);
    }

    /* FOOTER */
    footer {
      background: #1A1917; border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.4rem 5vw; flex-wrap: wrap; gap: 1rem;
    }
    .foot-logo { font-size: 0.88rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cream); text-decoration: none; }
    .foot-logo span { color: var(--orange); }
    .foot-copy { font-size: 0.62rem; color: #5C5752; }

    @media (max-width: 900px) {
      .blog-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .blog-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo">KRYS<span>.</span>PT</a>
  <a href="../index.html" class="nav-back">← Back to site</a>
</nav>

<div class="blog-hero">
  <div class="blog-hero-label">Knowledge Base</div>
  <h1>Training.<br><span>Free Reads.</span></h1>
  <p>Evidence-based articles on strength, conditioning, nutrition, and performance. No fluff - just what works.</p>
  <div class="blog-bg-word">READ</div>
</div>

<div class="blog-filters">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="Training">Training</button>
  <button class="filter-btn" data-cat="Nutrition">Nutrition</button>
  <button class="filter-btn" data-cat="HYROX">HYROX</button>
  <button class="filter-btn" data-cat="Mindset">Mindset</button>
</div>

<div class="blog-grid-wrap">
  <div class="blog-grid" id="blog-grid">
    <!-- Articles injected by JS -->
  </div>
</div>

<footer>
  <a href="../index.html" class="foot-logo">KRYS<span>.</span>PT</a>
  <p class="foot-copy">© 2026 Przemyslaw Krys. All rights reserved.</p>
</footer>

<script>
// ═══════════════════════════════════════════════════════
//  ARTICLES - add your articles here
//  Each article needs a matching HTML file in /blog/
// ═══════════════════════════════════════════════════════
const ARTICLES = [
  {
    slug: "why-you-are-not-losing-weight",
    title: "Why You're Not Losing Weight - And What to Actually Do",
    excerpt: "Most people fail at fat loss not because of genetics, but because of a few fixable habits. Here's what's actually going on.",
    category: "Nutrition",
    date: "March 4, 2026",
    readTime: "6 min read",
    thumb: "linear-gradient(135deg, #2A2A2A, #3D2010)"
  },
  {
    slug: "minimum-effective-dose-muscle",
    title: "Minimum Effective Dose for Building Muscle",
    excerpt: "How much training do you really need? The answer might surprise you - and free up a lot of your week.",
    category: "Training",
    date: "Feb 18, 2026",
    readTime: "4 min read",
    thumb: "linear-gradient(135deg, #2A2A2A, #1A2A1A)"
  },
  {
    slug: "build-engine-without-losing-strength",
    title: "How to Build Your Engine Without Losing Strength",
    excerpt: "Concurrent training done right - how to raise your aerobic ceiling without sacrificing the strength you've worked hard to build.",
    category: "HYROX",
    date: "Feb 1, 2026",
    readTime: "5 min read",
    thumb: "linear-gradient(135deg, #2A2A2A, #1A1A2E)"
  }
];

// Render articles
function renderArticles(filter) {
  const grid = document.getElementById('blog-grid');
  const filtered = filter === 'all' ? ARTICLES : ARTICLES.filter(a => a.category === filter);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-articles">No articles in this category yet - check back soon.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <a class="article-card" href="${a.slug}.html">
      <div class="article-thumb">
        <div class="article-thumb-bg" style="background: ${a.thumb}; color: rgba(235,94,40,0.4);">
          ${a.category}
        </div>
      </div>
      <div class="article-body">
        <div class="article-cat">${a.category}</div>
        <div class="article-title">${a.title}</div>
        <div class="article-excerpt">${a.excerpt}</div>
        <div class="article-meta">
          <span>${a.date} · ${a.readTime}</span>
          <span class="article-read-more">Read →</span>
        </div>
      </div>
    </a>
  `).join('');
}

renderArticles('all');

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderArticles(btn.dataset.cat);
  });
});
</script>

</body>
</html>

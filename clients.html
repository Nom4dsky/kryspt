<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRYS PT — Client Portal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <style>
    :root {
      --orange:#EB5E28; --black:#252422; --dark:#403D39;
      --silver:#8A8580; --bg:#F4F1EA; --card:#FFFFFF; --border:#E5E1D8;
      --f:'Oswald',sans-serif; --fb:'Poppins',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);font-family:var(--fb);color:var(--black);min-height:100vh;}

    /* LOGIN */
    #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
    .login-logo{display:flex;align-items:center;gap:0.6rem;font-family:var(--f);font-size:1rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--black);text-decoration:none;margin-bottom:2.5rem;}
    .login-logo img{height:30px;width:auto;}
    .login-box{background:var(--card);border:1px solid var(--border);border-top:4px solid var(--orange);padding:2.8rem 2.4rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
    .login-label{font-family:var(--f);font-size:0.58rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--orange);display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;}
    .login-label::before{content:'';width:16px;height:2px;background:var(--orange);}
    .login-box h2{font-family:var(--f);font-size:1.8rem;font-weight:700;text-transform:uppercase;letter-spacing:-0.01em;margin-bottom:0.5rem;color:var(--black);}
    .login-box p{font-size:0.82rem;color:var(--silver);line-height:1.7;margin-bottom:2rem;}
    .login-box input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--black);padding:0.9rem 1rem;font-family:var(--fb);font-size:0.88rem;outline:none;transition:border-color 0.2s;margin-bottom:0.8rem;}
    .login-box input:focus{border-color:var(--orange);}
    .login-box input::placeholder{color:#bbb;}
    .login-btn{width:100%;background:var(--orange);color:white;border:none;padding:0.95rem;font-family:var(--f);font-size:0.72rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;}
    .login-btn:hover{opacity:0.88;}
    .login-error{display:none;margin-top:1rem;font-size:0.75rem;color:#d94f4f;text-align:center;}
    .login-error.show{display:block;}

    /* DASHBOARD */
    #dashboard{display:none;}
    .dash-nav{background:white;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding:0.9rem 5vw;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
    .dash-nav-logo{display:flex;align-items:center;gap:0.5rem;font-family:var(--f);font-size:0.95rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--black);text-decoration:none;}
    .dash-nav-logo img{height:26px;width:auto;}
    .dash-nav-logo span{color:var(--orange);letter-spacing:0;}
    .dash-nav-right{display:flex;align-items:center;gap:1rem;}
    .dash-greeting{font-size:0.72rem;font-weight:500;color:var(--silver);}
    .dash-greeting strong{color:var(--orange);font-weight:600;}
    .logout-btn{font-family:var(--f);font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--silver);background:none;border:1px solid var(--border);padding:0.4rem 0.8rem;cursor:pointer;transition:all 0.2s;}
    .logout-btn:hover{border-color:var(--orange);color:var(--orange);}

    .dash-body{padding:2.5rem 5vw 5rem;max-width:960px;margin:0 auto;}

    .dash-welcome{margin-bottom:2.5rem;}
    .dash-welcome h1{font-family:var(--f);font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;text-transform:uppercase;letter-spacing:-0.01em;line-height:1.1;color:var(--black);margin-bottom:1rem;}
    .dash-welcome h1 span{color:var(--orange);}
    .tip-box{font-size:0.85rem;color:var(--dark);line-height:1.85;background:white;border-left:4px solid var(--orange);padding:1rem 1.4rem;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
    .tip-label{font-family:var(--f);font-size:0.55rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--orange);margin-bottom:0.4rem;}

    .section-label{font-family:var(--f);font-size:0.58rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--orange);display:flex;align-items:center;gap:0.5rem;margin-bottom:1.2rem;margin-top:2.5rem;}
    .section-label::before{content:'';width:16px;height:2px;background:var(--orange);}

    .plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);overflow:hidden;}
    .day-card{background:white;padding:1.4rem 1.2rem;}
    .day-card.rest{background:#FAFAF8;}
    .day-name{font-family:var(--f);font-size:0.58rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange);margin-bottom:0.4rem;}
    .day-focus{font-family:var(--f);font-size:0.88rem;font-weight:700;text-transform:uppercase;color:var(--black);border-bottom:1px solid var(--border);padding-bottom:0.8rem;margin-bottom:0.9rem;}
    .day-card.rest .day-focus{color:var(--silver);}
    .exercise-list{list-style:none;display:flex;flex-direction:column;gap:0.5rem;}
    .exercise-list li{font-size:0.78rem;color:var(--dark);padding-left:1rem;position:relative;line-height:1.55;}
    .exercise-list li::before{content:'→';position:absolute;left:0;color:var(--orange);font-size:0.65rem;top:1px;}
    .exercise-list li strong{color:var(--black);font-weight:600;}

    .downloads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;}
    .download-card{background:white;padding:1.6rem;border:1px solid var(--border);display:flex;flex-direction:column;gap:0.7rem;transition:box-shadow 0.2s,border-color 0.2s;}
    .download-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:var(--orange);}
    .download-icon{width:28px;height:28px;color:var(--orange);}
    .download-title{font-family:var(--f);font-size:0.88rem;font-weight:700;text-transform:uppercase;color:var(--black);}
    .download-meta{font-size:0.72rem;color:var(--silver);}
    .download-btn{display:inline-flex;align-items:center;gap:0.4rem;font-family:var(--f);font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);text-decoration:none;transition:opacity 0.2s;}
    .download-btn:hover{opacity:0.7;}

    @media(max-width:600px){
      .dash-body{padding:1.5rem 1rem 4rem;}
      .plan-grid,.downloads-grid{grid-template-columns:1fr;}
      .dash-greeting{display:none;}
      .login-box{padding:2rem 1.4rem;}
    }
  </style>
</head>
<body>

<div id="login-screen">
  <a href="index.html" class="login-logo">
    <img src="images/logo.png" alt="KRYS.PT" />
    KRYS<span style="color:var(--orange);letter-spacing:0">.</span>PT
  </a>
  <div class="login-box">
    <div class="login-label">Client Portal</div>
    <h2>Welcome<br>Back.</h2>
    <p>Enter the access code provided by Krys to view your personal training program.</p>
    <input type="password" id="password-input" placeholder="Enter your access code" autocomplete="off" />
    <button class="login-btn" onclick="checkPassword()">Access My Program →</button>
    <div class="login-error" id="login-error">Incorrect code. Contact Krys if you've forgotten it.</div>
  </div>
</div>

<div id="dashboard">
  <nav class="dash-nav">
    <a href="index.html" class="dash-nav-logo">
      <img src="images/logo.png" alt="KRYS.PT" />
      KRYS<span>.</span>PT
    </a>
    <div class="dash-nav-right">
      <div class="dash-greeting">Hello, <strong id="client-name-display"></strong></div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </nav>
  <div class="dash-body" id="dash-body"></div>
</div>

<script>
const TIPS = [
  "Sleep is your most underrated recovery tool. 7–9 hours will do more for your progress than any supplement.",
  "You don't need to feel destroyed after every session. Consistent, smart training beats grinding yourself into the ground every time.",
  "Progressive overload is the engine of muscle growth. Add a little more — one rep, one kg — week by week and the results will come.",
  "Protein is non-negotiable. Aim for at least 1.6g per kg of bodyweight to support muscle building and recovery.",
  "The best workout is the one you actually show up to. Consistency over months beats perfection once a week.",
  "Rest days are training days. Your muscles grow when you recover, not when you lift.",
  "Tracking your lifts is one of the simplest things you can do to accelerate progress.",
  "Don't skip the warm-up. 5–10 minutes of movement prep protects your joints and improves every set.",
  "Hydration directly affects strength. Even mild dehydration can reduce performance noticeably.",
  "Form first, weight second. Ego lifting leads to plateaus and injuries. Master the movement, then load it.",
  "Compound lifts — squat, hinge, press, pull — give you the most return for your time.",
  "Stress outside the gym affects recovery inside it. High cortisol = slower gains. Manage your load.",
  "Zone 2 cardio (a pace where you can hold a conversation) builds your aerobic base without eating into recovery.",
  "Meal timing matters less than total daily intake. Hit your calories and protein first.",
  "Every elite athlete has a coach. Feedback on your movement is how you avoid years of wasted effort.",
  "Muscle soreness doesn't mean a workout was effective — it just means your body wasn't used to that stimulus.",
  "You can train hard or train often — but rarely both, long-term. Find the intensity that lets you keep showing up.",
  "If you're not sleeping, not eating enough protein, or skipping sessions — no program will fix that.",
  "Mind-muscle connection is real. Slowing down and feeling the target muscle leads to better results over time.",
  "Trust the process. Visible results take 8–12 weeks of consistent effort. Most people quit at week 4. Don't be most people."
];

const CLIENTS = [
  {
    password: "marco2025",
    name: "Marco",
    plan: [
      { day: "Monday", focus: "Lower Body — Squat Focus", exercises: ["<strong>Back Squat</strong> — 4×5 @ RIR 2","<strong>Romanian Deadlift</strong> — 3×10 @ RIR 3","<strong>Leg Press</strong> — 3×12 @ RIR 2","<strong>Walking Lunges</strong> — 3×12 each @ RIR 3","<strong>Calf Raises</strong> — 4×15 @ RIR 1"] },
      { day: "Tuesday", focus: "Upper Body — Push", exercises: ["<strong>Bench Press</strong> — 4×5 @ RIR 2","<strong>Overhead Press</strong> — 3×8 @ RIR 2","<strong>Incline DB Press</strong> — 3×10 @ RIR 3","<strong>Tricep Pushdowns</strong> — 3×12 @ RIR 2","<strong>Lateral Raises</strong> — 3×15 @ RIR 1"] },
      { day: "Wednesday", focus: "Active Recovery", rest: true, exercises: ["20–30 min easy walk or Zone 2 cardio","10 min mobility — hips & thoracic spine"] },
      { day: "Thursday", focus: "Lower Body — Hinge Focus", exercises: ["<strong>Deadlift</strong> — 4×4 @ RIR 2","<strong>Bulgarian Split Squat</strong> — 3×8 each @ RIR 2","<strong>Leg Curl</strong> — 3×12 @ RIR 2","<strong>Hip Thrust</strong> — 3×12 @ RIR 2","<strong>Plank</strong> — 3×45 sec"] },
      { day: "Friday", focus: "Upper Body — Pull", exercises: ["<strong>Weighted Pull-Ups</strong> — 4×5 @ RIR 2","<strong>Barbell Row</strong> — 3×8 @ RIR 2","<strong>Seated Cable Row</strong> — 3×12 @ RIR 2","<strong>Face Pulls</strong> — 3×15 @ RIR 1","<strong>Bicep Curls</strong> — 3×12 @ RIR 2"] },
      { day: "Saturday", focus: "Conditioning", exercises: ["<strong>Ski Erg</strong> — 4×500m @ 85%","<strong>KB Swings</strong> — 4×20","<strong>Burpee Broad Jump</strong> — 3×10","Rest 2 min between rounds"] },
      { day: "Sunday", focus: "Full Rest", rest: true, exercises: ["Rest and recover.","Optional: 15 min stretching"] }
    ],
    downloads: [
      { title: "Training Program — Block 2", meta: "PDF · Weeks 5–8 · Strength Focus", file: "files/marco-block2.pdf" },
      { title: "Nutrition Guidelines", meta: "PDF · Calorie & macro targets", file: "files/marco-nutrition.pdf" }
    ]
  },
  {
    password: "anna2025",
    name: "Anna",
    plan: [
      { day: "Monday", focus: "Full Body A", exercises: ["<strong>Goblet Squat</strong> — 3×10 @ RIR 3","<strong>DB Romanian Deadlift</strong> — 3×10 @ RIR 3","<strong>DB Bench Press</strong> — 3×10 @ RIR 3","<strong>Seated Row</strong> — 3×12 @ RIR 2","<strong>Plank</strong> — 3×30 sec"] },
      { day: "Tuesday", focus: "Rest / Walk", rest: true, exercises: ["20 min easy walk","5 min stretching"] },
      { day: "Wednesday", focus: "Full Body B", exercises: ["<strong>Leg Press</strong> — 3×12 @ RIR 2","<strong>Hip Thrust</strong> — 3×12 @ RIR 2","<strong>Overhead Press</strong> — 3×10 @ RIR 3","<strong>Lat Pulldown</strong> — 3×12 @ RIR 2","<strong>Dead Bug</strong> — 3×8 each side"] },
      { day: "Thursday", focus: "Rest", rest: true, exercises: ["Full rest day"] },
      { day: "Friday", focus: "Full Body C", exercises: ["<strong>DB Sumo Deadlift</strong> — 3×10 @ RIR 3","<strong>Step-Ups</strong> — 3×10 each @ RIR 3","<strong>Push-Ups</strong> — 3×max @ RIR 1","<strong>One-Arm DB Row</strong> — 3×10 each @ RIR 2","<strong>Glute Bridge</strong> — 3×15 @ RIR 1"] },
      { day: "Saturday", focus: "Light Cardio", rest: true, exercises: ["30 min walk or easy bike","10 min yoga / stretching"] },
      { day: "Sunday", focus: "Full Rest", rest: true, exercises: ["Rest and recover."] }
    ],
    downloads: [
      { title: "Training Program — Block 1", meta: "PDF · Weeks 1–4 · Foundation", file: "files/anna-block1.pdf" }
    ]
  }
];

function checkPassword() {
  const input = document.getElementById('password-input').value.trim().toLowerCase();
  const client = CLIENTS.find(c => c.password.toLowerCase() === input);
  if (client) {
    document.getElementById('login-error').classList.remove('show');
    showDashboard(client);
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }
}
document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function showDashboard(client) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('client-name-display').textContent = client.name;

  const tip = TIPS[Math.floor(Math.random() * TIPS.length)];
  const body = document.getElementById('dash-body');

  let html = `
    <div class="dash-welcome">
      <h1>Hey <span>${client.name}</span>,<br>Here's Your Plan.</h1>
      <div class="tip-box">
        <div class="tip-label">💡 Tip of the Day</div>
        ${tip}
      </div>
    </div>
    <div class="section-label">This Week's Training</div>
    <div class="plan-grid">
      ${client.plan.map(day => `
        <div class="day-card ${day.rest ? 'rest' : ''}">
          <div class="day-name">${day.day}</div>
          <div class="day-focus">${day.focus}</div>
          <ul class="exercise-list">${day.exercises.map(e => `<li>${e}</li>`).join('')}</ul>
        </div>`).join('')}
    </div>`;

  if (client.downloads && client.downloads.length > 0) {
    html += `<div class="section-label">Your Documents</div><div class="downloads-grid">`;
    client.downloads.forEach(dl => {
      html += `
        <div class="download-card">
          <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="12" x2="12" y2="18"/>
            <polyline points="9 15 12 18 15 15"/>
          </svg>
          <div class="download-title">${dl.title}</div>
          <div class="download-meta">${dl.meta}</div>
          <a href="${dl.file}" download class="download-btn">Download PDF →</a>
        </div>`;
    });
    html += `</div>`;
  }

  body.innerHTML = html;
}

function logout() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('password-input').value = '';
}
</script>
</body>
</html>

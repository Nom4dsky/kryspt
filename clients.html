<html lang="en">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    :root {
      --f:'Oswald',sans-serif;
      --fb:'Poppins',sans-serif;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:#fff; font-family:var(--fb); color:#000; min-height:100vh; }

    /* ── LOGIN ── */
    #login-screen {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:2rem;
      background:#f5f5f5;
    }
    .login-logo {
      display:flex; align-items:center; gap:0.6rem;
      font-family:var(--f); font-size:1rem; font-weight:700;
      letter-spacing:0.08em; text-transform:uppercase;
      color:#000; text-decoration:none; margin-bottom:2.5rem;
    }
    .login-logo img { height:30px; width:auto;  }

    .login-box {
      background:#f8f8f8; border:1px solid #e0e0e0;
      border-top:3px solid #000;
      padding:2.8rem 2.4rem; width:100%; max-width:400px;
    }
    .login-label {
      font-family:var(--f); font-size:0.58rem; font-weight:700;
      letter-spacing:0.22em; text-transform:uppercase; color:#888;
      display:flex; align-items:center; gap:0.5rem; margin-bottom:1.2rem;
    }
    .login-label::before { content:''; width:16px; height:2px; background:#444; }
    .login-box h2 {
      font-family:var(--f); font-size:1.8rem; font-weight:700;
      text-transform:uppercase; letter-spacing:-0.01em;
      margin-bottom:0.5rem; color:#000;
    }
    .login-box p { font-size:0.82rem; color:#888; line-height:1.7; margin-bottom:2rem; }
    .login-box input {
      width:100%; background:#fff; border:1px solid #ccc;
      color:#000; padding:0.9rem 1rem; font-family:var(--fb);
      font-size:0.88rem; outline:none; transition:border-color 0.2s; margin-bottom:0.8rem;
    }
    .login-box input:focus { border-color:#000; }
    .login-box input::placeholder { color:#aaa; }
    .login-btn {
      width:100%; background:#000; color:#fff; border:none;
      padding:0.95rem; font-family:var(--f); font-size:0.72rem;
      font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
      cursor:pointer; transition:opacity 0.2s;
    }
    .login-btn:hover { opacity:0.85; }
    .login-error { display:none; margin-top:1rem; font-size:0.75rem; color:#888; text-align:center; }
    .login-error.show { display:block; }

    /* ── DASHBOARD ── */
    #dashboard { display:none; }

    .dash-nav {
      background:#fff; border-bottom:1px solid #e0e0e0;
      display:flex; justify-content:space-between; align-items:center;
      padding:0.9rem 5vw; position:sticky; top:0; z-index:100;
    }
    .dash-nav-logo {
      display:flex; align-items:center; gap:0.5rem;
      font-family:var(--f); font-size:0.95rem; font-weight:700;
      letter-spacing:0.08em; text-transform:uppercase;
      color:#000; text-decoration:none;
    }
    .dash-nav-logo img { height:26px; width:auto;  }
    .dash-nav-logo span { letter-spacing:0; }
    .dash-nav-right { display:flex; align-items:center; gap:1rem; }
    .dash-greeting { font-size:0.72rem; color:#888; }
    .dash-greeting strong { color:#000; font-weight:600; }
    .logout-btn {
      font-family:var(--f); font-size:0.6rem; font-weight:700;
      letter-spacing:0.12em; text-transform:uppercase;
      color:#888; background:none; border:1px solid #ccc;
      padding:0.4rem 0.8rem; cursor:pointer; transition:all 0.2s;
    }
    .logout-btn:hover { border-color:#000; color:#000; }

    /* ── BODY ── */
    .dash-body { padding:2.5rem 5vw 5rem; max-width:960px; margin:0 auto; }

    /* ── WELCOME ── */

      font-family:var(--f); font-size:clamp(1.6rem,4vw,2.6rem);
      font-weight:700; text-transform:uppercase; letter-spacing:-0.01em;
      line-height:1.1; color:#000; margin-bottom:1rem;
    }
    .dash-welcome h1 span { color:#000; }
    .tip-box {

      font-family:var(--f); font-size:0.55rem; font-weight:700;

      margin-bottom:1.2rem; margin-top:2.5rem;
    }
    .section-label::before { content:''; width:16px; height:2px; background:#333; }

    .plan-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:1px; background:#e0e0e0; border:1px solid #e0e0e0; overflow:hidden;

    .day-card.rest { background:#f2f2f2; }
    .day-name {
      font-family:var(--f); font-size:0.58rem; font-weight:700;
      letter-spacing:0.2em; text-transform:uppercase; color:#888; margin-bottom:0.4rem;

    .exercise-list li strong { color:#111; font-weight:600; }

      background:#f8f8f8; padding:1.6rem;

    .download-title { font-family:var(--f); font-size:0.88rem; font-weight:700; text-transform:uppercase; color:#000; }
    .download-meta { font-size:0.72rem; color:#888; }

      border-bottom:1px solid #999; padding-bottom:2px;
      width:fit-content; transition:border-color 0.2s;
    }
    .download-btn:hover { border-color:#000; }

      letter-spacing: 0.18em; text-transform: uppercase;

    .rir-num{font-family:var(--f);font-weight:700;font-size:0.78rem;min-width:46px;color:#111;}
    .rir-desc{color:#777;}
    .rir-note{font-size:0.78rem;color:#999;font-style:italic;margin-bottom:0!important;}

    .day-notes textarea {

    .day-notes textarea::placeholder { color:#bbb; }
    .day-card.rest .day-notes textarea { background:#f8f8f8; }

      .dash-body { padding:1.5rem 1rem 4rem; }
      .plan-grid, .downloads-grid { grid-template-columns:1fr; }

      .login-box { padding:2rem 1.4rem; }
    }
  </style>
</head>

function checkPassword() {
  const input = document.getElementById('password-input').value.trim().toLowerCase();
  const client = CLIENTS.find(c => c.password.toLowerCase() === input);
  if (client) {
    document.getElementById('login-error').classList.remove('show');
    if (client.redirect) {
      window.location.href = client.redirect;
      return;
    }
    showDashboard(client);
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }
}
document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function renderWeeklyView(client) {
  // Split exercises into day sections by looking for day-header divs
  function buildDaySections(exercises) {
    const sections = [];
    let current = null;
    exercises.forEach(ex => {
      // Detect day-divider headers we embedded
      const headerMatch = ex.match(/style='[^']*text-transform:uppercase[^']*'>([^<]+)<\/div>/);
      if (headerMatch) {
        if (current) sections.push(current);
        current = { title: headerMatch[1], items: [] };
      } else {
        if (!current) current = { title: null, items: [] };
        current.items.push(ex);
      }
    });
    if (current) sections.push(current);
    return sections;
  }

  const tabs = client.plan.map((w, i) =>
    `<button class="week-tab ${i===0?'active':''}" onclick="switchWeekTab(${i}, this)">${w.day}</button>`
  ).join('');

  const panels = client.plan.map((w, wi) => {
    const sections = buildDaySections(w.exercises);
    const sectionsHtml = sections.map((s, si) => {
      const itemsHtml = s.items.map(e => `<li>${e}</li>`).join('');
      return `
        <div class="day-section">
          ${s.title ? `<div class="day-section-header">${s.title}</div>` : ''}
          <div class="day-section-body"><ul>${itemsHtml}</ul></div>
        </div>`;
    }).join('');

    return `
      <div class="week-panel ${wi===0?'active':''}" id="wpanel-${wi}">
        <div class="week-card">
          <div class="week-card-title">${w.day}</div>
          <div class="week-card-sub">${w.focus}</div>
          ${sectionsHtml}
          <div class="wk-notes">
            <textarea id="wnote-${wi}" placeholder="Week notes - weights, energy, anything…"></textarea>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="section-label">Training Block</div>
    <div class="week-tabs">${tabs}</div>
    ${panels}`;
}

function switchWeekTab(idx, el) {
  document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.week-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('wpanel-' + idx).classList.add('active');
}

function showDashboard(client) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('client-name-display').textContent = client.name;

  const tip = TIPS[Math.floor(Math.random() * TIPS.length)];
  const body = document.getElementById('dash-body');

  let html = `
    <div class="dash-welcome">
      <h1>Hey <span>${client.name}</span>,<br>Here's Your Plan.</h1>
      <div class="tip-box">
        <div class="tip-label">Tip of the Day</div>
        ${tip}
      </div>
    </div>
    ${client.weeklyView ? renderWeeklyView(client) : `
    <div class="section-label">This Week's Training</div>
    <div class="plan-grid">
      ${client.plan.map((day, di) => `
        <div class="day-card ${day.rest ? 'rest' : ''}">
          <div class="day-name">${day.day}</div>
          <div class="day-focus">${day.focus}</div>
          <ul class="exercise-list">${day.exercises.map(e => `<li>${e}</li>`).join('')}</ul>
          <div class="day-notes">
            <textarea id="note-${di}" placeholder="Weights, how you felt, anything…"></textarea>
          </div>
        </div>`).join('')}
    </div>`}`;

  // RIR explanation - only show if client has exercises with RIR
  const hasRIR = client.plan.some(d => d.exercises.some(e => e.includes('RIR')));
  if (hasRIR) {
    html += `
    <div class="rir-explainer">
      <div class="rir-title">What is RIR?</div>
      <p><strong>RIR = Reps In Reserve</strong> - how many more reps you could do before failure.</p>
      <div class="rir-scale">
        <div class="rir-item"><span class="rir-num">RIR 0</span><span class="rir-desc">Absolute max - nothing left</span></div>
        <div class="rir-item"><span class="rir-num">RIR 1</span><span class="rir-desc">1 rep left in the tank - very hard</span></div>
        <div class="rir-item"><span class="rir-num">RIR 2</span><span class="rir-desc">2 reps left - challenging but controlled</span></div>
        <div class="rir-item"><span class="rir-num">RIR 3</span><span class="rir-desc">3 reps left - moderately hard</span></div>
      </div>
      <p class="rir-note">RIR 2 is your default target - hard enough to drive progress, smart enough to recover from.</p>
    </div>`;
  }

  if (client.downloads && client.downloads.length > 0) {
    html += `<div class="section-label">Your Documents</div><div class="downloads-grid">`;
    client.downloads.forEach(dl => {
      html += `
        <div class="download-card">
          <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="12" x2="12" y2="18"/>
            <polyline points="9 15 12 18 15 15"/>
          </svg>
          <div class="download-title">${dl.title}</div>
          <div class="download-meta">${dl.meta}</div>
          <a href="${dl.file}" download class="download-btn">Download PDF →</a>
        </div>`;
    });
    html += `</div>`;
  }

  body.innerHTML = html;
}
